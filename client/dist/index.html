    <!-- Fija el atributo lang lo antes posible, sincronizado con la elección
         del usuario (mismo criterio que detectLang en el cliente). Evita el
         desajuste entre <html lang> y el idioma realmente mostrado. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('domino_lang');
          var lang = (saved === 'es' || saved === 'pt' || saved === 'en')
            ? saved
            : (function () {
                var n = (navigator.language || 'es').toLowerCase();
                if (n.indexOf('pt') === 0) return 'pt';
                if (n.indexOf('en') === 0) return 'en';
                return 'es';
              })();
          document.documentElement.lang = lang;
        } catch (e) { /* modo privado: se queda en es */ }
      })();
    </script>
